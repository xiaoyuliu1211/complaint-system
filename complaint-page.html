<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>客户反馈</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #07c160 0%, #059e4c 100%);
            color: white;
            padding: 40px 20px 60px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .form-container {
            background: white;
            margin: -30px 15px 20px;
            border-radius: 12px;
            padding: 25px 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 15px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-group label .required {
            color: #ff4d4f;
            margin-left: 4px;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
            background: #fafafa;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #07c160;
            background: white;
        }
        
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .complaint-type {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .type-tag {
            padding: 8px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }
        
        .type-tag.active {
            background: #07c160;
            color: white;
            border-color: #07c160;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #07c160 0%, #059e4c 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .submit-btn:active {
            transform: scale(0.98);
        }
        
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .success-page {
            display: none;
            text-align: center;
            padding: 100px 20px;
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: #07c160;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
        }
        
        .success-icon::after {
            content: '✓';
            color: white;
            font-size: 40px;
            font-weight: bold;
        }
        
        .success-page h2 {
            color: #333;
            font-size: 22px;
            margin-bottom: 12px;
        }
        
        .success-page p {
            color: #666;
            font-size: 15px;
            line-height: 1.6;
        }
        
        .back-btn {
            margin-top: 30px;
            padding: 12px 40px;
            background: white;
            color: #07c160;
            border: 1px solid #07c160;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 15px;
            z-index: 1000;
            display: none;
        }
        
        .toast.show {
            display: block;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -40%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }
        
        .privacy-notice {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }
        
        .privacy-notice strong {
            color: #333;
        }
    </style>
</head>
<body>
    <!-- 表单页面 -->
    <div id="form-page">
        <div class="header">
            <h1>📋 意见反馈</h1>
            <p>您的意见对我们非常重要，我们会认真处理</p>
        </div>
        
        <div class="form-container">
            <form id="complaint-form">
                <div class="form-group">
                    <label>反馈类型</label>
                    <div class="complaint-type">
                        <span class="type-tag active" data-type="suggestion">功能建议</span>
                        <span class="type-tag" data-type="complaint">服务投诉</span>
                        <span class="type-tag" data-type="bug">问题反馈</span>
                        <span class="type-tag" data-type="other">其他</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>您的姓名 <span class="required">*</span></label>
                    <input type="text" id="name" placeholder="请输入您的姓名" required>
                </div>
                
                <div class="form-group">
                    <label>联系电话 <span class="required">*</span></label>
                    <input type="tel" id="phone" placeholder="请输入您的手机号" required>
                </div>
                
                <div class="form-group">
                    <label>反馈内容 <span class="required">*</span></label>
                    <textarea id="content" placeholder="请详细描述您的反馈内容，我们会尽快处理..." required></textarea>
                </div>
                
                <div class="privacy-notice">
                    <strong>隐私说明：</strong>您的反馈信息将被严格保密，仅用于改进我们的服务。提交反馈即表示您同意我们收集上述信息以便与您联系。
                </div>
                
                <button type="submit" class="submit-btn">提交反馈</button>
            </form>
        </div>
    </div>
    
    <!-- 成功页面 -->
    <div id="success-page" class="success-page">
        <div class="success-icon"></div>
        <h2>提交成功！</h2>
        <p>感谢您的反馈，我们会认真处理并及时与您联系<br>如有紧急问题，请拨打客服电话</p>
        <button class="back-btn" onclick="backToForm()">返回</button>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script>
        // 获取URL参数（企业微信会传递一些参数）
        function getUrlParam(name) {
            const reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)');
            const r = window.location.search.substr(1).match(reg);
            if (r != null) return decodeURIComponent(r[2]);
            return null;
        }
        
        // 投诉类型选择
        document.querySelectorAll('.type-tag').forEach(tag => {
            tag.addEventListener('click', function() {
                document.querySelectorAll('.type-tag').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });
        
        // 表单提交
        document.getElementById('complaint-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const type = document.querySelector('.type-tag.active').dataset.type;
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const content = document.getElementById('content').value.trim();
            
            // 验证手机号
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showToast('请输入正确的手机号');
                return;
            }
            
            // 获取用户ID（如果有）
            const userId = getUrlParam('userid') || '未知用户';
            
            // 构建投诉数据
            const complaintData = {
                id: Date.now(),
                type: type,
                typeText: document.querySelector('.type-tag.active').textContent,
                name: name,
                phone: phone,
                content: content,
                userId: userId,
                createTime: new Date().toLocaleString('zh-CN'),
                status: 'pending',
                source: '企业微信投诉入口'
            };
            
            // 保存到本地存储（实际项目中应该发送到服务器）
            let complaints = JSON.parse(localStorage.getItem('complaints') || '[]');
            complaints.unshift(complaintData);
            localStorage.setItem('complaints', JSON.stringify(complaints));
            
            // 同时保存到防封系统的数据中
            saveToAntiBlockSystem(complaintData);
            
            // 显示成功页面
            document.getElementById('form-page').style.display = 'none';
            document.getElementById('success-page').style.display = 'block';
            
            // 重置表单
            document.getElementById('complaint-form').reset();
        });
        
        // 保存到防封系统
        function saveToAntiBlockSystem(data) {
            // 读取现有数据
            let systemData = JSON.parse(localStorage.getItem('wechatAntiBlockSystem') || '{}');
            
            // 初始化投诉记录数组
            if (!systemData.complaints) {
                systemData.complaints = [];
            }
            
            // 添加新投诉
            systemData.complaints.unshift({
                id: data.id,
                type: data.typeText,
                userName: data.name,
                phone: data.phone,
                content: data.content,
                time: data.createTime,
                status: '待处理',
                source: data.source
            });
            
            // 保存回本地存储
            localStorage.setItem('wechatAntiBlockSystem', JSON.stringify(systemData));
        }
        
        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
        
        // 返回表单
        function backToForm() {
            document.getElementById('success-page').style.display = 'none';
            document.getElementById('form-page').style.display = 'block';
        }
        
        // 自动填充用户信息（如果有）
        window.onload = function() {
            const userId = getUrlParam('userid');
            if (userId) {
                console.log('来自用户:', userId);
            }
        };
    </script>
</body>
</html>
